<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOLO 即時物件辨識</title>
    <link rel="stylesheet" href="/static/style.css?v=7">
</head>
<body>
    <div class="container">
        <header>
            <h1>YOLO 即時物件辨識</h1>
            <p class="subtitle">開放詞彙偵測系統</p>
            <p class="hint">💡 點擊偵測框可更正辨識結果</p>
        </header>

        <div class="main-content">
            <!-- 雙畫面區域 -->
            <div class="dual-view-section">
                <!-- 本地攝影機畫面 -->
                <div class="video-box">
                    <div class="video-label">📷 本地攝影機</div>
                    <div class="video-container" id="localVideoContainer">
                        <video id="localVideo" autoplay playsinline muted></video>
                        <div class="no-camera" id="noCameraMessage">
                            <div class="camera-icon">📷</div>
                            <p>請允許攝影機權限</p>
                        </div>
                    </div>
                </div>
                <!-- YOLO 偵測結果畫面 -->
                <div class="video-box">
                    <div class="video-label">🔍 YOLO 偵測結果</div>
                    <div class="video-container" id="yoloVideoContainer">
                        <canvas id="overlayCanvas"></canvas>
                        <div class="video-overlay">
                            <div class="fps-display" id="fpsDisplay">FPS: --</div>
                            <div class="object-count" id="objectCount">物件: 0</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 控制面板 -->
            <div class="control-panel">
                <button id="startBtn" class="btn btn-primary">
                    <span class="btn-icon">▶</span>
                    開始偵測
                </button>
                <button id="stopBtn" class="btn btn-secondary" disabled>
                    <span class="btn-icon">⏹</span>
                    停止
                </button>
                <button id="captureBtn" class="btn btn-accent" disabled>
                    <span class="btn-icon">📷</span>
                    截圖
                </button>
            </div>

            <!-- 檢測結果列表 -->
            <div class="results-section">
                <h2>檢測結果</h2>
                <div class="results-container" id="resultsContainer">
                    <div class="empty-state">
                        <p>尚未開始偵測</p>
                    </div>
                </div>
            </div>

            <!-- 物品註冊面板 -->
            <div class="register-section">
                <h2>註冊新物品</h2>
                <p class="register-hint">看到未被辨識的物品？在這裡新增讓系統學會偵測它</p>
                <div class="register-form">
                    <input type="text" id="newClassEn" placeholder="英文名稱（如 tissue box）" />
                    <input type="text" id="newClassCn" placeholder="中文名稱（如 面紙盒，可選）" />
                    <button id="addClassBtn" class="btn btn-primary btn-small">新增物品</button>
                </div>
                <div class="class-list-header">
                    <span>目前偵測類別</span>
                    <button id="refreshClassesBtn" class="btn-link">重新整理</button>
                </div>
                <div class="class-list" id="classList">
                    <div class="empty-state"><p>載入中...</p></div>
                </div>
            </div>

            <!-- 統計資訊 -->
            <div class="stats-section">
                <div class="stat-card">
                    <div class="stat-value" id="totalFrames">0</div>
                    <div class="stat-label">總幀數</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="avgFps">--</div>
                    <div class="stat-label">平均 FPS</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalDetections">0</div>
                    <div class="stat-label">檢測物件</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="connectionStatus">●</div>
                    <div class="stat-label">連線狀態</div>
                </div>
            </div>
        </div>

        <!-- 設定面板 -->
        <div class="settings-panel" id="settingsPanel">
            <div class="settings-header">
                <h3>設定</h3>
                <button id="closeSettings" class="close-btn">&times;</button>
            </div>
            <div class="settings-content">
                <div class="setting-item">
                    <label for="serverUrl">伺服器地址</label>
                    <div class="input-with-button">
                        <input type="text" id="serverUrl" value="" placeholder="ws://localhost:8000" readonly>
                        <button id="copyUrlBtn" class="copy-btn" title="複製連結">📋 複製</button>
                    </div>
                    <div class="setting-hint" id="currentUrlHint"></div>
                </div>
                <div class="setting-item">
                    <label for="resolution">解析度</label>
                    <select id="resolution">
                        <option value="640x480">640 x 480</option>
                        <option value="1280x720" selected>1280 x 720</option>
                        <option value="1920x1080">1920 x 1080</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label for="frameRate">幀率</label>
                    <select id="frameRate">
                        <option value="10">10 FPS</option>
                        <option value="15" selected>15 FPS</option>
                        <option value="30">30 FPS</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 浮動設定按鈕 -->
        <button id="settingsBtn" class="settings-btn" title="設定">
            ⚙
        </button>

        <!-- 通知區域 -->
        <div class="notification" id="notification"></div>

        <!-- 除錯面板（預設收合） -->
        <button class="debug-toggle-btn" id="debugToggleBtn" title="除錯日誌">🔧</button>
        <div class="debug-panel collapsed" id="debugPanel">
            <div class="debug-header">
                <span>除錯日誌</span>
                <div class="debug-header-buttons">
                    <button id="copyDebugBtn" class="debug-clear-btn" title="複製日誌">複製</button>
                    <button id="clearDebugBtn" class="debug-clear-btn">清除</button>
                    <button id="debugCollapseBtn" class="debug-clear-btn">收合</button>
                </div>
            </div>
            <div class="debug-content" id="debugContent">
                <div class="debug-line debug-info">[系統] 頁面已載入，等待啟動...</div>
            </div>
        </div>

        <!-- 標註狀態面板 -->
        <div class="annotation-panel" id="annotationPanel">
            <div class="annotation-header">
                <span>📋 標註狀態</span>
                <button class="annotation-toggle" id="annotationToggleBtn">−</button>
            </div>
            <div class="annotation-content" id="annotationContent">
                <div class="annotation-empty">尚無反饋資料</div>
            </div>
            <div class="annotation-footer" id="annotationFooter">
                總反饋: 0 筆
            </div>
        </div>
    </div>

    <script src="/static/app.js?v=7"></script>
</body>
</html>
