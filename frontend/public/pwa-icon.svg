<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- 圓角方塊背景（PWA 圖示要做成正方形 + 圓角，maskable safe area） -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- glow -->
  <circle cx="256" cy="256" r="180" fill="url(#glow)"/>
  <!-- ⟡ glyph -->
  <text x="256" y="356" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="320" font-weight="700" fill="#ffffff" opacity="0.95">⟡</text>
  <!-- 底部文字 ARGUS -->
  <text x="256" y="450" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="56" font-weight="700" fill="#ffffff" letter-spacing="6">ARGUS</text>
</svg>
