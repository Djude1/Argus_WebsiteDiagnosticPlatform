server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 16m;

  # 後端 API（DRF）
  location /api/ {
    proxy_pass http://web:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }

  # Django Admin（jazzmin 後台，superuser 後門；React 後台走 / fallback）
  location /django-admin/ {
    proxy_pass http://web:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # 後端 media（截圖、Word 報告）
  location /media/ {
    proxy_pass http://web:8000;
    proxy_set_header Host $host;
  }

  # PWA manifest 需正確 MIME，避免部分瀏覽器無法判定可安裝
  location = /manifest.webmanifest {
    types { application/manifest+json webmanifest; }
    default_type application/manifest+json;
    try_files /manifest.webmanifest =404;
  }

  # 瀏覽器會自動找 /favicon.ico；直接回 SVG，避免 SPA fallback 回 HTML。
  location = /favicon.ico {
    default_type image/svg+xml;
    try_files /favicon.svg =404;
  }

  location = /favicon.svg {
    default_type image/svg+xml;
    try_files /favicon.svg =404;
  }

  # Django Admin 靜態檔（DEBUG=true 時由 runserver 提供）
  location /static/ {
    proxy_pass http://web:8000;
    proxy_set_header Host $host;
  }

  # SPA fallback：所有其他路徑回傳 index.html，交給 React Router 處理
  location / {
    try_files $uri $uri/ /index.html;
  }
}
