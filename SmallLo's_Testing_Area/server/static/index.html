<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmallLo YOLO Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 16px;
            color: #00d4ff;
        }
        .container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            flex-wrap: wrap;
        }
        .video-panel {
            flex: 2;
            min-width: 400px;
        }
        .info-panel {
            flex: 1;
            min-width: 280px;
        }
        #videoCanvas {
            width: 100%;
            border: 2px solid #333;
            border-radius: 8px;
            background: #000;
        }
        .card {
            background: #16213e;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #333;
        }
        .card h3 {
            font-size: 0.9rem;
            color: #00d4ff;
            margin-bottom: 8px;
        }
        .stat {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.85rem;
        }
        .stat-value {
            color: #0f0;
            font-weight: bold;
        }
        .status-dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .status-dot.connected { background: #0f0; }
        .status-dot.disconnected { background: #f00; }
        #detectionList {
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.8rem;
        }
        .detection-item {
            padding: 4px 8px;
            margin: 2px 0;
            background: #1a1a3e;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
        }
        .detection-item .cls { color: #0f0; }
        .detection-item .conf { color: #ff0; }
    </style>
</head>
<body>
    <h1>SmallLo YOLO Monitor</h1>
    <div class="container">
        <div class="video-panel">
            <canvas id="videoCanvas" width="640" height="480"></canvas>
        </div>
        <div class="info-panel">
            <div class="card">
                <h3>Connection Status</h3>
                <div class="stat">
                    <span><span class="status-dot" id="viewerDot"></span>Video Stream</span>
                    <span class="stat-value" id="viewerStatus">Disconnected</span>
                </div>
                <div class="stat">
                    <span><span class="status-dot" id="detDot"></span>Detections</span>
                    <span class="stat-value" id="detStatus">Disconnected</span>
                </div>
            </div>
            <div class="card">
                <h3>Performance</h3>
                <div class="stat">
                    <span>Display FPS</span>
                    <span class="stat-value" id="fps">0</span>
                </div>
                <div class="stat">
                    <span>Inference</span>
                    <span class="stat-value" id="inferenceMs">0 ms</span>
                </div>
                <div class="stat">
                    <span>Objects</span>
                    <span class="stat-value" id="objCount">0</span>
                </div>
            </div>
            <div class="card">
                <h3>Detections</h3>
                <div id="detectionList"></div>
            </div>
        </div>
    </div>
    <script src="/static/main.js"></script>
</body>
</html>
