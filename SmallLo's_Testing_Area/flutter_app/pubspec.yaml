name: visual_impairment_assistant
description: "Visual impairment assistance app using AI and mobile sensors"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9

  # Network
  web_socket_channel: ^2.4.0

  # Camera
  camera: ^0.11.0+2
  image: ^4.1.3

  # Audio
  record: ^6.0.0
  audioplayers: ^5.2.1

  # Permissions
  permission_handler: ^11.1.0

  # Utilities
  connectivity_plus: ^5.0.2
  path_provider: ^2.1.5
  shared_preferences: ^2.2.2
  uuid: ^4.2.2
  logger: ^2.0.2+1
  freezed_annotation: ^2.4.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  freezed: ^2.4.6

flutter:
  uses-material-design: true
